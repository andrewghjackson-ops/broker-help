<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broker Scam Recovery Support</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    /* Main Container (Carrd Style) */
    .container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      max-width: 640px;
      width: 100%;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
    }

    /* Typography */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .sub-header {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .contact-info {
      display: inline-block;
      background-color: #0f172a;
      border: 1px solid #334155;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #38bdf8;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: border-color 0.2s ease;
    }

    .contact-info:hover {
      border-color: #38bdf8;
    }

    .instructions {
      font-size: 0.95rem;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #334155;
    }

    /* Form Layout */
    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-row {
      display: flex;
      gap: 1rem;
    }

    .form-row .form-group {
      flex: 1;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    input, textarea {
      width: 100%;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Submit Button */
    button[type="submit"] {
      background-color: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button[type="submit"]:hover {
      background-color: #7dd3fc;
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }

    /* Footer */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: #64748b;
      border-top: 1px solid #334155;
      padding-top: 1.25rem;
    }

    /* Mobile Responsiveness */
    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      .form-row {
        flex-direction: column;
        gap: 1.25rem;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <h1>Been scammed by a broker?</h1>
    <p class="sub-header">
    
Have you lost money to an online broker? Submit your information below and we'll review your case and get back to you as soon as possible.</p>

    <!-- Direct Contact Info -->
    <a href="mailto:info.derrickleroy@gmail.com" class="contact-info">
      ✉ info.derrickleroy@gmail.com
    </a>

    <!-- Instructions / Body Text -->
    <p class="instructions">Before we begin, please send the following details:</p>

    <!-- Form linked directly to Formspree endpoint -->
    <form action="https://formspree.io/f/maqrpozw" method="POST">
      <div class="form-group">
        <label for="fullName">1. Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="country">2. Country of Residence</label>
          <input type="text" id="country" name="country" placeholder="United Kingdom" required>
        </div>
        <div class="form-group">
          <label for="occupation">3. Occupation</label>
          <input type="text" id="occupation" name="occupation" placeholder="Software Engineer">
        </div>
      </div>

      <div class="form-group">
        <label for="brokerName">4. Name of the Broker/Company</label>
        <input type="text" id="brokerName" name="brokerName" placeholder="e.g. AcmeFX Trading" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="depositAmount">5. Total Initial Deposit</label>
          <input type="text" id="depositAmount" name="depositAmount" placeholder="$5,000 USD" required>
        </div>
        <div class="form-group">
          <label for="profitAmount">6. Accumulated Profit</label>
          <input type="text" id="profitAmount" name="profitAmount" placeholder="$12,000 USD">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="depositMethod">7. Deposit Method</label>
          <input type="text" id="depositMethod" name="depositMethod" placeholder="Credit Card / Crypto / Wire" required>
        </div>
        <div class="form-group">
          <label for="accountDate">8. Date Created</label>
          <input type="text" id="accountDate" name="accountDate" placeholder="DD/MM/YYYY" required>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">9. Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
      </div>

      <div class="form-group">
        <label for="description">10. How did you come into contact with the broker?</label>
        <textarea id="description" name="description" placeholder="Briefly describe how you found them (e.g., Instagram ad, Telegram group)..." required></textarea>
      </div>

      <button type="submit">Send Details</button>
    </form>

    <!-- Footer -->
    <footer>
      I respond within 24 hours.
    </footer>
  </div>

</body>
</html>
